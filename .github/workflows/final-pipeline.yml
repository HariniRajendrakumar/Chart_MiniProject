name: Final Pipeline - Deploy & Email Notification

on:
  push:
    branches:
      - main

jobs:
  final-pipeline:
    name: Final Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Check PHP Syntax
        run: |
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file"
          done
          echo "All PHP files passed syntax check!"

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "SUCCESS - Code merged to main | ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Your code has been successfully merged and deployed!

            Repository : ${{ github.repository }}
            Branch     : main
            Author     : ${{ github.actor }}
            Commit     : ${{ github.sha }}
            View       : https://github.com/${{ github.repository }}/commit/${{ github.sha }}

            All pipeline checks passed successfully.

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "FAILED - Pipeline error on main | ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Your pipeline failed after merging to main!

            Repository : ${{ github.repository }}
            Branch     : main
            Author     : ${{ github.actor }}
            Commit     : ${{ github.sha }}
            View Logs  : https://github.com/${{ github.repository }}/actions

            Please check the logs and fix the issue.
