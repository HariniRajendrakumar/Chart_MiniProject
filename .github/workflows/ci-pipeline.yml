name: CI Pipeline - Security Check & Merge Gate

on:
  pull_request:
    branches:
      - main

jobs:
  php-security-check:
    name: PHP Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install PHP CodeSniffer + Security Ruleset
        run: |
          composer require --dev squizlabs/php_codesniffer
          composer require --dev pheature-flags/phpcs-security-audit || true
          wget -q https://raw.githubusercontent.com/FloeDesignTechnologies/phpcs-security-audit/master/Security/ruleset.xml -O security-ruleset.xml

      - name: Run PHP Security Scan
        run: |
          echo " Scanning PHP files for security issues..."
          ./vendor/bin/phpcs --standard=security-ruleset.xml --extensions=php --ignore=vendor/ . || true
          echo " PHP Security scan complete."

      - name: Check for PHP syntax errors
        run: |
          echo " Checking PHP syntax..."
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file"
          done
          echo " No PHP syntax errors found."

      - name: Validate HTML files
        run: |
          echo " Listing HTML/CSS files found in project..."
          find . -name "*.html" -not -path "./vendor/*"
          find . -name "*.css"  -not -path "./vendor/*"
          echo " HTML/CSS files listed successfully."

      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-report
          path: security-ruleset.xml
          if-no-files-found: ignore
