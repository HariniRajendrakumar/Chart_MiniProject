<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Player's Contribution</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        canvas {
            max-width: 600px;
            max-height: 600px;
            margin: auto;
        }
    </style>
</head>
<body>
    <center>
    <h2>Cricket Player's contribution</h2></center>
    <canvas id="myPieChart"></canvas>

    <script>
        const ctx = document.getElementById('myPieChart').getContext('2d');
        const myPieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                
                labels: ['Red', 'Blue', 'Yellow', 'Pink', 'Purple'],
                datasets: [{
                    label: 'My Dataset',
                    data: [5, 4, 7, 3, 6],
                    backgroundColor: [
                        'rgba(255, 99, 112, 0.7)',
                        'rgba(14, 182, 235, 0.7)',
                        'rgba(255, 226, 86, 0.7)',
                        'rgba(255, 162, 182, 0.7)',
                        'rgba(193, 122, 255, 0.7)',
                    ],
                    borderColor: 'rgba(255, 255, 255, 1)',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(tooltipItem) {
                                return tooltipItem.label + ': ' + tooltipItem.raw;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
